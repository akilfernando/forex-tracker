<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#020617" />
    <title>USD → LKR · NDB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      body { background: #020617; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
      const { useState, useEffect, useMemo, useCallback } = React;

      // Same-origin: page is served from the repo, rates.json sits beside it.
      const RATES_URL = "rates.json";
      const FLOOR_KEY = "ndb-floor";
      const DEFAULT_FLOOR = 332;

      // Fallback so the page is never empty. Real NDB USD TT, 2026-06-15.
      const SEED = {
        updated_at: "2026-06-15T00:00:00Z",
        history: [
          { date: "2026-06-15", ndb_effective: "2026-06-15", ndb_buy: 331, ndb_sell: 340, market_mid: null },
        ],
      };

      const fmt = (n) =>
        typeof n === "number" && !isNaN(n)
          ? n.toLocaleString("en-LK", { minimumFractionDigits: 2, maximumFractionDigits: 2 })
          : "--";

      function Chart({ data }) {
        if (data.length < 2) return null;
        const W = 600, H = 200, pad = 6;
        const vals = data.map((d) => d.buy);
        let min = Math.min(...vals), max = Math.max(...vals);
        if (min === max) { min -= 1; max += 1; }
        const x = (i) => pad + (i / (data.length - 1)) * (W - 2 * pad);
        const y = (v) => H - pad - ((v - min) / (max - min)) * (H - 2 * pad);
        const pts = data.map((d, i) => `${x(i)},${y(d.buy)}`).join(" ");
        const last = data[data.length - 1];
        return (
          <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-auto" preserveAspectRatio="xMidYMid meet">
            <line x1={pad} y1={y(max)} x2={W - pad} y2={y(max)} stroke="#1e293b" strokeDasharray="3 3" />
            <line x1={pad} y1={y(min)} x2={W - pad} y2={y(min)} stroke="#1e293b" strokeDasharray="3 3" />
            <polyline fill="none" stroke="#34d399" strokeWidth="2.5" points={pts} />
            <circle cx={x(data.length - 1)} cy={y(last.buy)} r="4" fill="#34d399" />
            <text x={pad} y={y(max) - 4} fill="#64748b" fontSize="13" fontFamily="monospace">{fmt(max)}</text>
            <text x={pad} y={y(min) + 14} fill="#64748b" fontSize="13" fontFamily="monospace">{fmt(min)}</text>
          </svg>
        );
      }

      function App() {
        const [data, setData] = useState(null);
        const [usingSeed, setUsingSeed] = useState(false);
        const [floor, setFloor] = useState(DEFAULT_FLOOR);
        const [floorInput, setFloorInput] = useState(String(DEFAULT_FLOOR));
        const [usd, setUsd] = useState("");
        const [lkr, setLkr] = useState("");
        const [loading, setLoading] = useState(true);

        useEffect(() => {
          const saved = localStorage.getItem(FLOOR_KEY);
          if (saved) { setFloor(Number(saved)); setFloorInput(saved); }
          (async () => {
            try {
              const res = await fetch(RATES_URL, { cache: "no-store" });
              if (!res.ok) throw new Error(res.status);
              const j = await res.json();
              if (!j.history || !j.history.length) throw new Error("empty");
              setData(j);
            } catch (e) {
              setData(SEED);
              setUsingSeed(true);
            }
            setLoading(false);
          })();
        }, []);

        const saveFloor = useCallback(() => {
          const v = parseFloat(floorInput);
          if (isNaN(v) || v <= 0) return;
          setFloor(v);
          localStorage.setItem(FLOOR_KEY, String(v));
        }, [floorInput]);

        const a = useMemo(() => {
          if (!data || !data.history.length) return null;
          const hist = [...data.history].sort((x, z) => (x.date < z.date ? -1 : 1));
          const latest = hist[hist.length - 1];
          const current = latest.ndb_buy;

          const cutoff = new Date(latest.date);
          cutoff.setDate(cutoff.getDate() - 90);
          const cutStr = cutoff.toISOString().slice(0, 10);
          const window90 = hist.filter((h) => h.date >= cutStr);
          const buys = window90.map((h) => h.ndb_buy);
          const min = Math.min(...buys);
          const max = Math.max(...buys);
          const pos = max > min ? (current - min) / (max - min) : 1;
          const pct = buys.filter((b) => b <= current).length / buys.length;

          const withMkt = hist.filter((h) => typeof h.market_mid === "number");
          let trend = null, trendDelta = null;
          if (withMkt.length >= 2) {
            const lastM = withMkt[withMkt.length - 1];
            const target = new Date(lastM.date);
            target.setDate(target.getDate() - 7);
            const tStr = target.toISOString().slice(0, 10);
            let ref = withMkt[0];
            for (const h of withMkt) if (h.date <= tStr) ref = h;
            trendDelta = lastM.market_mid - ref.market_mid;
            trend = trendDelta > 0.05 ? "up" : trendDelta < -0.05 ? "down" : "flat";
          }

          const aboveFloor = current >= floor;
          const high = pos >= 0.66;
          let verdict, vClass, vNote;
          if (aboveFloor && high) {
            verdict = "Favorable";
            vClass = "border-emerald-500 bg-emerald-500/10 text-emerald-300";
            vNote = "Above your floor and near the recent high. Strong window to convert.";
          } else if (aboveFloor) {
            verdict = "Above floor";
            vClass = "border-amber-500 bg-amber-500/10 text-amber-300";
            vNote = "Meets your floor but mid-range. Convert if you need LKR now.";
          } else if (high) {
            verdict = "Below floor";
            vClass = "border-amber-600 bg-amber-600/10 text-amber-300";
            vNote = "High vs recent weeks but under your floor. Close — your call.";
          } else {
            verdict = "Hold";
            vClass = "border-rose-500 bg-rose-500/10 text-rose-300";
            vNote = "Low vs recent range and under your floor. Wait unless forced.";
          }

          return { hist, latest, current, min, max, pos, pct, verdict, vClass, vNote, trend };
        }, [data, floor]);

        if (loading)
          return <div className="min-h-screen grid place-items-center text-slate-400 text-sm">Loading...</div>;

        const chartData = a.hist.map((h) => ({ date: h.date.slice(5), buy: h.ndb_buy }));

        return (
          <div className="min-h-screen text-slate-100 px-4 py-5 sm:p-6 font-sans">
            <div className="max-w-2xl mx-auto">
              <div className="flex items-baseline justify-between border-b border-slate-800 pb-3 mb-5">
                <div>
                  <h1 className="text-lg font-semibold tracking-tight">USD → LKR · NDB</h1>
                  <p className="text-xs text-slate-500">Worth converting now?</p>
                </div>
                <span className="text-[10px] uppercase tracking-widest text-slate-600">
                  {a.hist.length} day{a.hist.length === 1 ? "" : "s"}
                </span>
              </div>

              {usingSeed && (
                <p className="text-xs text-amber-400/80 mb-4 border-l-2 border-amber-600 pl-3">
                  Could not load rates.json — showing seed. Check the file sits beside index.html.
                </p>
              )}

              <div className={`rounded-xl border p-4 mb-5 ${a.vClass}`}>
                <div className="text-[10px] uppercase tracking-widest opacity-70 mb-1">Verdict</div>
                <div className="text-2xl font-semibold">{a.verdict}</div>
                <p className="text-xs mt-1 opacity-90">{a.vNote}</p>
              </div>

              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-5">
                <div className="rounded-xl border border-slate-800 bg-slate-900 p-4">
                  <div className="text-[10px] uppercase tracking-widest text-emerald-500 mb-1">NDB buys USD at</div>
                  <div className="font-mono text-3xl font-semibold text-emerald-400">{fmt(a.current)}</div>
                  <div className="text-[10px] text-slate-500 mt-1">LKR per 1 USD · TT</div>
                </div>
                <div className="rounded-xl border border-slate-800 bg-slate-900 p-4">
                  <div className="text-[10px] uppercase tracking-widest text-slate-500 mb-1">90-day range</div>
                  <div className="font-mono text-sm text-slate-300">{fmt(a.min)} – {fmt(a.max)}</div>
                  <div className="mt-3 h-1.5 rounded bg-slate-800 relative">
                    <div className="absolute top-1/2 -translate-y-1/2 w-2 h-2 rounded-full bg-emerald-400"
                      style={{ left: `calc(${Math.round(a.pos * 100)}% - 4px)` }} />
                  </div>
                  <div className="text-[10px] text-slate-500 mt-1">{Math.round(a.pct * 100)}th percentile</div>
                </div>
              </div>

              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-5">
                <div className="rounded-xl border border-slate-800 bg-slate-900 p-4">
                  <div className="text-[10px] uppercase tracking-widest text-slate-500 mb-2">Your floor</div>
                  <div className="flex gap-2">
                    <input value={floorInput} onChange={(e) => setFloorInput(e.target.value)} inputMode="decimal"
                      className="w-24 px-2 py-2 rounded-lg bg-slate-950 border border-slate-700 font-mono text-base focus:outline-none focus:border-emerald-500" />
                    <button onClick={saveFloor}
                      className="px-3 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 text-xs font-medium">Save</button>
                  </div>
                  <div className="text-[10px] text-slate-500 mt-2">
                    {a.current >= floor ? "Current ≥ floor ✓" : `Need +${fmt(floor - a.current)}`}
                  </div>
                </div>
                <div className="rounded-xl border border-slate-800 bg-slate-900 p-4">
                  <div className="text-[10px] uppercase tracking-widest text-slate-500 mb-1">Rupee trend (7d)</div>
                  {a.trend ? (
                    <React.Fragment>
                      <div className={`text-xl font-mono ${a.trend === "up" ? "text-rose-400" : a.trend === "down" ? "text-emerald-400" : "text-slate-400"}`}>
                        {a.trend === "up" ? "▲ weakening" : a.trend === "down" ? "▼ strengthening" : "flat"}
                      </div>
                      <div className="text-[10px] text-slate-500 mt-1">
                        {a.trend === "up" ? "NDB buy may rise — waiting could gain (uncertain)"
                          : a.trend === "down" ? "NDB buy may fall — converting sooner avoids loss"
                          : "no clear direction"}
                      </div>
                    </React.Fragment>
                  ) : (
                    <div className="text-xs text-slate-500">Need more market data points</div>
                  )}
                </div>
              </div>

              <div className="rounded-xl border border-slate-800 bg-slate-900 p-4 mb-5">
                <div className="text-[10px] uppercase tracking-widest text-slate-500 mb-2">Convert at current buy rate</div>
                <div className="flex items-center gap-2">
                  <span className="text-slate-500 text-sm font-mono shrink-0">$</span>
                  <input value={usd} onChange={(e) => setUsd(e.target.value)} placeholder="0.00" inputMode="decimal"
                    className="flex-1 min-w-0 px-3 py-2.5 rounded-lg bg-slate-950 border border-slate-700 font-mono text-base focus:outline-none focus:border-emerald-500" />
                </div>
                <div className="font-mono text-2xl font-semibold text-emerald-400 mt-2 break-all">
                  {parseFloat(usd) > 0 ? "LKR " + fmt(parseFloat(usd) * a.current) : "—"}
                </div>
                <div className="text-[10px] text-slate-500 mt-1">× {fmt(a.current)} · gross, before bank fees or spread</div>

                <div className="border-t border-slate-800 my-3" />

                <div className="text-[10px] uppercase tracking-widest text-slate-500 mb-2">USD needed for target LKR</div>
                <div className="flex items-center gap-2">
                  <span className="text-slate-500 text-sm font-mono shrink-0">LKR</span>
                  <input value={lkr} onChange={(e) => setLkr(e.target.value)} placeholder="0" inputMode="decimal"
                    className="flex-1 min-w-0 px-3 py-2.5 rounded-lg bg-slate-950 border border-slate-700 font-mono text-base focus:outline-none focus:border-amber-500" />
                </div>
                <div className="font-mono text-2xl font-semibold text-amber-400 mt-2 break-all">
                  {parseFloat(lkr) > 0 ? "$" + fmt(parseFloat(lkr) / a.current) : "—"}
                </div>
                <div className="text-[10px] text-slate-500 mt-1">÷ {fmt(a.current)} · withdraw a touch more to cover fees</div>
              </div>

              {chartData.length > 1 && (
                <div className="rounded-xl border border-slate-800 bg-slate-900 p-4 mb-4">
                  <div className="text-[10px] uppercase tracking-widest text-slate-500 mb-3">NDB USD buying rate</div>
                  <Chart data={chartData} />
                </div>
              )}

              <p className="text-[10px] text-slate-600 leading-relaxed">
                NDB effective {a.latest.ndb_effective || "?"} · captured {a.latest.date}. Market trend from
                mid-market USD-LKR (direction only, not NDB's counter rate). Not financial advice; FX timing is uncertain.
              </p>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
