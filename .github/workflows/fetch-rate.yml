name: Fetch NDB USD rate

on:
  schedule:
    - cron: "30 5 * * *" # 05:30 UTC = 11:00 Sri Lanka, after morning rate set
  workflow_dispatch: {} # manual run button

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install cheerio

      - run: node scripts/fetch-rate.mjs

      - name: Commit if changed
        run: |
          git config user.name "rate-bot"
          git config user.email "rate-bot@users.noreply.github.com"
          git add rates.json
          if git diff --cached --quiet; then
            echo "no change"
          else
            git commit -m "rate update $(date -u +%F)"
            git push
          fi
