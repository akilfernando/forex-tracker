name: Fetch NDB USD rate

on:
  schedule:
    - cron: "30 5 * * *" # 05:30 UTC = 11:00 Sri Lanka, after morning rate set
  workflow_dispatch: {} # manual run button

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install cheerio nodemailer

      - run: node scripts/fetch-rate.mjs

      - name: Commit if changed
        run: |
          git config user.name "rate-bot"
          git config user.email "rate-bot@users.noreply.github.com"
          git add rates.json
          if git diff --cached --quiet; then
            echo "no change"
          else
            git commit -m "rate update $(date -u +%F)"
            git push
          fi

      - name: Email alert if buy crossed floor
        run: node scripts/alert.mjs
        env:
          ALERT_FLOOR: ${{ vars.ALERT_FLOOR }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
